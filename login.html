<!DOCTYPE html>
<html>

    <title>Login - Own Cloud</title>

</head>

  <!-- Home Page button -->

        <svg viewBox="0 0 24 24">

    </form>

    <p><a href="register.html">Create Account</a></p>
  </div>

  <!-- <script src="js/main.js"></script> -->

</body>
